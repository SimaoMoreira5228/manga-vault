name: Release

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch: {}

permissions:
  contents: write
  packages: write
  pull-requests: write

jobs:
  detect:
    name: Detect version changes
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests tomli

      - name: Generate release manifest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python .github/scripts/prepare_releases.py

      - name: Check if anything changed
        id: check
        run: |
          if [ ! -f release_manifest.json ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          elif [ "$(jq -r '.created_releases | length' release_manifest.json)" -eq 0 ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload manifest
        if: steps.check.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: release-manifest
          path: release_manifest.json

  build-binaries:
    name: ${{ matrix.suffix }}
    needs: detect
    if: needs.detect.outputs.has_changes == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            suffix: linux-x86_64
          - runner: windows-2025
            suffix: windows-x86_64
          - runner: macos-15-intel
            suffix: macos-x86_64
          - runner: macos-15
            suffix: macos-aarch64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust-release"
          cache-on-failure: true
          shared-key: "rust-release-build-${{ runner.os }}"

      - name: Build all binaries
        shell: bash
        run: |
          CRATES=$(jq -r '.[] | select(.type=="cargo-bin") | "-p \(.crate)"' .github/packages.json | tr -d '\r' | tr '\n' ' ')
          cargo build $CRATES --release

      - name: Stage renamed binaries
        shell: bash
        run: |
          mkdir -p staging
          for bin in $(jq -r '.[] | select(.type=="cargo-bin") | .bin_name' .github/packages.json | tr -d '\r'); do
            src="target/release/$bin"
            if [ -f "${src}.exe" ]; then
              cp "${src}.exe" "staging/${bin}-${{ matrix.suffix }}.exe"
            else
              cp "$src" "staging/${bin}-${{ matrix.suffix }}"
            fi
          done

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.suffix }}
          path: staging/

  build-scrapers:
    name: scrapers
    needs: detect
    if: needs.detect.outputs.has_changes == 'true'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust-scrapers"
          cache-on-failure: true
          shared-key: "rust-release-build-scrapers"

      - name: Install cargo-binstall
        run: curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash

      - name: Install cargo-component
        run: cargo binstall -y cargo-component --force

      - name: Add cargo bin to PATH
        run: echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Build WASM scrapers
        run: |
          mkdir -p staging
          for crate in $(jq -r '.[] | select(.type=="scraper-rust-wasm") | .crate' .github/packages.json); do
            cargo component build --package "$crate" --target wasm32-wasip1 --release
            cp "target/wasm32-wasip1/release/${crate}.wasm" "staging/"
          done

      - name: Copy Lua plugins
        run: |
          for src in $(jq -r '.[] | select(.type=="lua-plugin") | .id' .github/packages.json); do
            cp "scrapers/$src/${src}.lua" "staging/"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: scrapers
          path: staging/

  build-website:
    name: website
    needs: detect
    if: needs.detect.outputs.has_changes == 'true'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable pnpm
        run: corepack enable pnpm

      - name: Build website
        working-directory: apps/website
        run: |
          if [ ! -f .env ] && [ -f .env.example ]; then cp .env.example .env; fi
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Create version.json
        working-directory: apps/website
        run: |
          VERSION=$(node -p "require('./package.json').version")
          mkdir -p build
          printf '{"version":"%s","tag_name":"website@v%s"}\n' "$VERSION" "$VERSION" > build/version.json

      - name: Zip website
        run: |
          mkdir -p staging
          cd apps/website/build
          zip -r "$OLDPWD/staging/website.zip" .

      - uses: actions/upload-artifact@v4
        with:
          name: website
          path: staging/

  assemble:
    if: always() && needs.detect.outputs.has_changes == 'true'
    needs: [detect, build-binaries, build-scrapers, build-website]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: binaries-*
          merge-multiple: true
          path: assets/

      - name: Download scraper artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: scrapers
          merge-multiple: true
          path: assets/

      - name: Download website artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: website
          merge-multiple: true
          path: assets/

      - name: Download manifest
        uses: actions/download-artifact@v4
        with:
          name: release-manifest
          path: .

      - name: Assemble releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python .github/scripts/assemble_release.py

      - name: Generate repo.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python .github/scripts/generate_repo_json.py

      - name: Install dotslash
        run: curl -LSfs "https://github.com/facebook/dotslash/releases/latest/download/dotslash-ubuntu-22.04.$(uname -m).tar.gz" | tar fxz - -C /usr/local/bin dotslash

      - name: Format repo.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./tools/dprint.dotslash fmt repo.json

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ci/update-repo-json
          commit-message: "ci: update repo.json with latest scraper release URLs"
          title: "ci: update repo.json"
          body: |
            Automated update of `repo.json` with the latest scraper releases.
          base: master
          delete-branch: true
          labels: automated, release
          draft: false
          add-paths: "repo.json"
