name: Docker Publish

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  docker-publish:
    name: build & push ghcr.io images
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry & git index
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust-docker-ubuntu22"
          cache-on-failure: true
          shared-key: "rust-docker-build-ubuntu22-${{ runner.os }}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable pnpm via corepack
        run: corepack enable pnpm

      - name: Build release artifacts from source
        run: |
          mkdir -p docker/bin/website

          cargo build -p gql-api --release
          cargo build -p scheduler --release
          cargo build -p website-server --release

          cp target/release/manga-vault-gql docker/bin/manga-vault-gql-linux-x86_64
          cp target/release/manga-vault-scheduler docker/bin/manga-vault-scheduler-linux-x86_64
          cp target/release/manga-vault-website-server docker/bin/manga-vault-website-server-linux-x86_64

          chmod +x docker/bin/manga-vault-gql-linux-x86_64
          chmod +x docker/bin/manga-vault-scheduler-linux-x86_64
          chmod +x docker/bin/manga-vault-website-server-linux-x86_64

          if [ ! -f apps/website/.env ] && [ -f apps/website/.env.example ]; then
            cp apps/website/.env.example apps/website/.env
          fi

          cd apps/website
          pnpm install --frozen-lockfile
          pnpm run build
          cd -

          WEBSITE_VERSION=$(node -p "require('./apps/website/package.json').version")
          printf '{"version":"%s","tag_name":"website@v%s"}\n' "$WEBSITE_VERSION" "$WEBSITE_VERSION" > apps/website/build/version.json

          cp -a apps/website/build/. docker/bin/website/

      - name: Normalize owner to lowercase
        id: owner
        run: echo "name=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push gql-api
        uses: docker/build-push-action@v6
        with:
          context: docker/bin
          file: docker/gql-api.Dockerfile
          push: true
          tags: ghcr.io/${{ steps.owner.outputs.name }}/manga-vault-gql-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push scheduler
        uses: docker/build-push-action@v6
        with:
          context: docker/bin
          file: docker/scheduler.Dockerfile
          push: true
          tags: ghcr.io/${{ steps.owner.outputs.name }}/manga-vault-scheduler:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push website-server
        uses: docker/build-push-action@v6
        with:
          context: docker/bin
          file: docker/website-server.Dockerfile
          push: true
          tags: ghcr.io/${{ steps.owner.outputs.name }}/manga-vault-website-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
